<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz</title>
  <link rel="stylesheet" href="styles/style.css">
</head>

<body>
  <header>
    <h1>Quiz</h1>
  </header>

  <main>
    <section>
      <form action="/response" method="post">
        <fieldset>
          <legend>
            <h2>1. What is the capital of India?</h2>
          </legend>
          <div>
            <input type="radio" name="options" id="option-1" value="Tokyo">
            <label for="option-1">Tokyo</label>
          </div>
          <div>
            <input type="radio" name="options" id="option-2" value="New Delhi">
            <label for="option-2">New Delhi</label>
          </div>
          <div>
            <input type="radio" name="options" id="option-3" value="Islamabad">
            <label for="option-3">Islamabad</label>
          </div>
        </fieldset>
        <button type="submit">Submit</button>
      </form>
    </section>
  </main>
  <script type="module" src="scripts/quiz.js"></script>
</body>

</html>
